name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin yt-dlv

      - name: Package
        shell: bash
        run: |
          dist="yt-dlv-${{ matrix.target }}"
          mkdir -p "$dist"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/yt-dlv.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/yt-dlv" "$dist/"
          fi
          cp README.md LICENSE "$dist/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
          else
            tar czf "$dist.tar.gz" "$dist"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yt-dlv-*.tar.gz
            yt-dlv-*.zip
          generate_release_notes: true
